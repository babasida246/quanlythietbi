# ==============================================================================
# docker-compose.app.yml — Deploy chỉ App Services (API + Web UI)
#
# Dùng khi PostgreSQL và Redis chạy trên server riêng hoặc dịch vụ managed
# (AWS RDS, Azure Database, ElastiCache, Redis Cloud, v.v.)
#
# Cách dùng:
#   1. Tạo file .env (xem .env.example để biết các biến cần thiết)
#   2. Đặt DATABASE_URL và REDIS_URL trỏ đến server ngoài
#   3. docker-compose -f docker-compose.app.yml up -d
#
# Build image trước nếu chưa có:
#   docker-compose -f docker-compose.app.yml build
# ==============================================================================

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    image: qltb-api:latest
    container_name: qltb-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
      args:
        # VITE_ vars phải được truyền vào lúc BUILD, không phải lúc runtime
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000/api}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    image: qltb-web-ui:latest
    container_name: qltb-web-ui
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # BACKEND_BASE_URL dùng bởi SvelteKit server-side, có thể override lúc runtime
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://api:3000/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: qltb-nginx
    restart: unless-stopped
    environment:
      QLTB_DOMAIN: ${QLTB_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    command: ["sh", "-c", "sh /opt/qltb/nginx-select-template.sh && exec nginx -g 'daemon off;'"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
      - ./docker/nginx/templates:/opt/qltb/templates:ro
      - ./docker/scripts/nginx-select-template.sh:/opt/qltb/nginx-select-template.sh:ro
    depends_on:
      api:
        condition: service_healthy
      web-ui:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    container_name: qltb-certbot
    restart: unless-stopped
    environment:
      QLTB_DOMAIN: ${QLTB_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      LETSENCRYPT_STAGING: ${LETSENCRYPT_STAGING:-false}
      CERTBOT_RENEW_INTERVAL_SECONDS: ${CERTBOT_RENEW_INTERVAL_SECONDS:-43200}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
      - ./docker/nginx/templates:/opt/qltb/templates:ro
      - ./docker/scripts/nginx-select-template.sh:/opt/qltb/nginx-select-template.sh:ro
      - ./docker/scripts/certbot-loop.sh:/usr/local/bin/certbot-loop.sh:ro
    command: ["sh", "/usr/local/bin/certbot-loop.sh"]
    depends_on:
      nginx:
        condition: service_started
    pid: "service:nginx"

volumes:
  certbot_conf:
  certbot_www:
  nginx_conf:
