# Development mode: chỉ chạy infra trong Docker, code chạy local với hot-reload
#
# Cách dùng:
#   docker-compose -f docker-compose.dev.yml up -d    (khởi động infra)
#   pnpm install
#   npx tsc --build tsconfig.json                     (build packages 1 lần)
#   pnpm --filter @qltb/api dev                       (API hot-reload :3000)
#   pnpm --filter @qltb/web-ui dev                    (Web hot-reload :5173)

services:
  postgres:
    image: postgres:16-alpine
    container_name: qltb-postgres
    environment:
      POSTGRES_DB: qltb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - qltb_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qltb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '8080:80'
    depends_on:
      - postgres
    volumes:
      - qltb_pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    container_name: qltb-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - qltb_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: qltb-redis-insight
    ports:
      - '8001:5540'
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - qltb_redis_insight_data:/db

volumes:
  qltb_pgdata:
  qltb_pgadmin_data:
  qltb_redis_data:
  qltb_redis_insight_data:
