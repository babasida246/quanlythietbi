version: '3.8'

services:
  # Test database
  postgres-test:
    image: postgres:15-alpine
    container_name: qlts-postgres-test
    environment:
      POSTGRES_DB: assets_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assets_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Test Redis cache
  redis-test:
    image: redis:7-alpine
    container_name: qlts-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - test-network

  # API service for testing
  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: qlts-api-test
    environment:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/assets_test
      REDIS_URL: redis://redis-test:6379
      JWT_SECRET: test-secret-key
      CORS_ORIGIN: http://localhost:4173
    ports:
      - "3001:3000"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: ["pnpm", "dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - test-network

  # Web UI for testing
  web-test:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
      target: development
    container_name: qlts-web-test
    environment:
      NODE_ENV: test
      PUBLIC_API_BASE_URL: http://api-test:3000
      ORIGIN: http://localhost:4173
    ports:
      - "4174:4173"
    depends_on:
      api-test:
        condition: service_healthy
    volumes:
      - ./apps/web-ui:/app
      - /app/node_modules
    command: ["pnpm", "preview", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4173"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - test-network

  # Playwright test runner
  playwright-tests:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: qlts-playwright-tests
    environment:
      NODE_ENV: test
      API_BASE_URL: http://api-test:3000
      WEB_BASE_URL: http://web-test:4173
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/assets_test
      MOCK_AUTH: "true"
      PWTEST_SKIP_TEST_OUTPUT: "1"
    volumes:
      - ./tests:/app/tests
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
      - ./playwright.config.ts:/app/playwright.config.ts
      - ./.env.test:/app/.env.test
    depends_on:
      api-test:
        condition: service_healthy
      web-test:
        condition: service_healthy
    command: ["pnpm", "exec", "playwright", "test"]
    networks:
      - test-network

  # Test data seeder
  test-seeder:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: qlts-test-seeder
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/assets_test
    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./db:/app/db
      - ./scripts:/app/scripts
    command: ["sh", "/app/scripts/seed-test-data.sh"]
    networks:
      - test-network
    restart: "no"

volumes:
  postgres_test_data:

networks:
  test-network:
    driver: bridge