services:
  postgres:
    image: postgres:16-alpine
    container_name: qltb-postgres
    environment:
      POSTGRES_DB: qltb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - qltb_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qltb-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/qltb
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 10 bash -c '</dev/tcp/localhost/3000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    container_name: qltb-web-ui
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "timeout 10 bash -c '</dev/tcp/localhost/3001' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qltb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '8080:80'
    depends_on:
      - postgres
    volumes:
      - qltb_pgadmin_data:/var/lib/pgadmin

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: qltb-redis-insight
    ports:
      - '8001:8001'
    volumes:
      - qltb_redis_insight_data:/db

volumes:
  qltb_pgdata:
  qltb_pgadmin_data:
  qltb_redis_insight_data:
